<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Categories</title>
        <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body class="bg-gray-100">
        <nav class="bg-white border-b border-gray-200 shadow">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16">
                    <div class="flex items-center">
                        <a href="index.html"
                            class="text-2xl font-bold text-blue-600 hover:text-blue-800 text-decoration-none">Products
                            Store</a>
                    </div>
                    <div class="flex items-center space-x-4">
                        <a href="index.html"
                            class="text-gray-700 hover:bg-gray-100 hover:text-blue-600 px-3 py-2 rounded-md font-medium">Home</a>
                        <a href="products.html"
                            class="text-gray-700 hover:bg-gray-100 hover:text-blue-600 px-3 py-2 rounded-md font-medium">Products</a>
                        <a href="categories.html"
                            class="text-gray-700 bg-blue-100 hover:bg-blue-200 px-3 py-2 rounded-md font-bold">Categories</a>
                        <a href="orders.html"
                            class="text-gray-700 hover:bg-gray-100 hover:text-blue-600 px-3 py-2 rounded-md font-medium">Orders</a>
                    </div>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto py-8 px-4 sm:px-6 lg:px-8">
            <!-- Alert Messages -->
            <div id="successAlert"
                class="hidden mb-4 p-4 bg-green-100 border border-green-400 text-green-700 rounded-lg"></div>
            <div id="errorAlert" class="hidden mb-4 p-4 bg-red-100 border border-red-400 text-red-700 rounded-lg"></div>

            <div class="bg-white rounded-lg shadow-lg">
                <!-- Header with Create Button -->
                <div class="border-b border-gray-200 px-6 py-4 flex justify-between items-center">
                    <h2 class="text-2xl font-bold text-gray-900">Categories</h2>
                    <button onclick="showCreateForm()"
                        class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg">
                        + New Category
                    </button>
                </div>

                <!-- Create Form -->
                <div id="createForm" class="hidden border-b border-gray-200 p-6 bg-gray-50">
                    <h3 class="text-lg font-semibold text-gray-900 mb-4">Create New Category</h3>
                    <form onsubmit="createCategory(event)">
                        <div class="mb-4">
                            <label class="block text-gray-700 font-medium mb-2">Name *</label>
                            <input type="text" id="createName" required
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                placeholder="Category name">
                        </div>
                        <div class="mb-4">
                            <label class="block text-gray-700 font-medium mb-2">Description</label>
                            <textarea id="createDescription" rows="3"
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                placeholder="Category description"></textarea>
                        </div>
                        <div class="flex gap-2">
                            <button type="submit"
                                class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg">Create</button>
                            <button type="button" onclick="hideCreateForm()"
                                class="bg-gray-400 hover:bg-gray-500 text-white font-semibold py-2 px-4 rounded-lg">Cancel</button>
                        </div>
                    </form>
                </div>

                <!-- Categories Table -->
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead class="bg-gray-100 border-b border-gray-200">
                            <tr>
                                <th class="px-6 py-3 text-left text-sm font-semibold text-gray-900">ID</th>
                                <th class="px-6 py-3 text-left text-sm font-semibold text-gray-900">Name</th>
                                <th class="px-6 py-3 text-left text-sm font-semibold text-gray-900">Description</th>
                                <th class="px-6 py-3 text-left text-sm font-semibold text-gray-900">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="categoriesTable">
                            <tr class="border-b border-gray-200">
                                <td colspan="4" class="px-6 py-8 text-center text-gray-500">Loading categories...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>

        <!-- View Modal -->
        <div id="viewModal" class="hidden fixed inset-0 z-50 overflow-y-auto">
            <div class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center block sm:p-0">
                <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" onclick="closeViewModal()">
                </div>
                <div
                    class="relative inline-block align-bottom bg-white rounded-lg text-left max-h-[calc(100vh-4rem)] overflow-y-auto shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full">
                    <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                        <h3 class="text-lg font-medium text-gray-900 mb-4">Category Details</h3>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-gray-700 font-medium mb-1">ID</label>
                                <p class="text-gray-900" id="viewId">-</p>
                            </div>
                            <div>
                                <label class="block text-gray-700 font-medium mb-1">Name</label>
                                <p class="text-gray-900" id="viewName">-</p>
                            </div>
                            <div>
                                <label class="block text-gray-700 font-medium mb-1">Description</label>
                                <p class="text-gray-900" id="viewDescription">-</p>
                            </div>
                        </div>
                        <div class="flex gap-2 justify-end mt-6">
                            <button type="button" onclick="closeViewModal()"
                                class="bg-gray-400 hover:bg-gray-500 text-white font-semibold py-2 px-4 rounded-lg">Close</button>
                            <button type="button" onclick="switchToEditModal()"
                                class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg">Edit</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Edit Modal -->
        <div id="editModal" class="hidden fixed inset-0 z-50 overflow-y-auto">
            <div class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center block sm:p-0">
                <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" onclick="closeEditModal()">
                </div>
                <div
                    class="relative inline-block align-bottom bg-white rounded-lg text-left max-h-[calc(100vh-4rem)] overflow-y-auto shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full">
                    <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                        <h3 class="text-lg font-medium text-gray-900 mb-4">Edit Category</h3>
                        <form onsubmit="updateCategory(event)">
                            <input type="hidden" id="editId">
                            <div class="mb-4">
                                <label class="block text-gray-700 font-medium mb-2">Name *</label>
                                <input type="text" id="editName" required
                                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                            </div>
                            <div class="mb-4">
                                <label class="block text-gray-700 font-medium mb-2">Description</label>
                                <textarea id="editDescription" rows="3"
                                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                            </div>
                            <div class="flex gap-2 justify-end">
                                <button type="button" onclick="closeEditModal()"
                                    class="bg-gray-400 hover:bg-gray-500 text-white font-semibold py-2 px-4 rounded-lg">Cancel</button>
                                <button type="submit"
                                    class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg">Update</button>
                                <button type="button" onclick="deleteCategory()"
                                    class="bg-red-600 hover:bg-red-700 text-white font-semibold py-2 px-4 rounded-lg">Delete</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <script>
            const API_BASE_URL = '/api';
            async function fetchAPI(url, options = {}) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) {
                        const errorData = await response.json().catch(() => ({}));
                        throw new Error(errorData.error || `HTTP ${response.status}`);
                    }
                    return response.status === 204 ? null : await response.json();
                } catch (error) {
                    showError(error.message);
                    throw error;
                }
            }

            function showSuccess(message) {
                const alert = document.getElementById('successAlert');
                alert.textContent = message;
                alert.classList.remove('hidden');
                setTimeout(() => alert.classList.add('hidden'), 3000);
            }

            function showError(message) {
                const alert = document.getElementById('errorAlert');
                alert.textContent = message;
                alert.classList.remove('hidden');
                setTimeout(() => alert.classList.add('hidden'), 5000);
            }

            async function loadCategories() {
                try {
                    const categories = await fetchAPI(`${API_BASE_URL}/categories`);
                    const table = document.getElementById('categoriesTable');

                    if (!categories || categories.length === 0) {
                        table.innerHTML = '<tr class="border-b border-gray-200"><td colspan="4" class="px-6 py-8 text-center text-gray-500">No categories found</td></tr>';
                        return;
                    }

                    table.innerHTML = categories.map(cat => `
                    <tr class="border-b border-gray-200 hover:bg-gray-50 cursor-pointer" onclick="openViewModal(${cat.id})">
                        <td class="px-6 py-4 text-sm text-gray-900">${cat.id}</td>
                        <td class="px-6 py-4 text-sm text-gray-900"><span class="font-bold">${cat.name}</span></td>
                        <td class="px-6 py-4 text-sm text-gray-900">${cat.description || '-'}</td>
                        <td class="px-6 py-4 text-sm" onclick="event.stopPropagation()">
                            <button onclick="openEditModal(${cat.id})" class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-1 px-3 rounded-lg">Edit</button>
                        </td>
                    </tr>
                `).join('');
                } catch (error) {
                    console.error('Error loading categories:', error);
                }
            }

            function showCreateForm() {
                document.getElementById('createForm').classList.remove('hidden');
            }

            function hideCreateForm() {
                document.getElementById('createForm').classList.add('hidden');
                document.getElementById('createName').value = '';
                document.getElementById('createDescription').value = '';
            }

            async function createCategory(event) {
                event.preventDefault();
                const name = document.getElementById('createName').value;
                const description = document.getElementById('createDescription').value;

                try {
                    await fetchAPI(`${API_BASE_URL}/categories`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            name,
                            description: description || null
                        })
                    });
                    showSuccess('Category created successfully');
                    hideCreateForm();
                    loadCategories();
                } catch (error) {
                    console.error('Error creating category:', error);
                }
            }

            async function openViewModal(id) {
                try {
                    const category = await fetchAPI(`${API_BASE_URL}/categories/${id}`);
                    document.getElementById('viewId').textContent = category.id;
                    document.getElementById('viewName').textContent = category.name;
                    document.getElementById('viewDescription').textContent = category.description || '-';
                    document.getElementById('viewModal').classList.remove('hidden');
                    window.currentCategoryId = id;
                } catch (error) {
                    console.error('Error loading category:', error);
                }
            }

            function closeViewModal() {
                document.getElementById('viewModal').classList.add('hidden');
            }

            async function switchToEditModal() {
                closeViewModal();
                await openEditModal(window.currentCategoryId);
            }

            async function openEditModal(id) {
                try {
                    const category = await fetchAPI(`${API_BASE_URL}/categories/${id}`);
                    document.getElementById('editId').value = category.id;
                    document.getElementById('editName').value = category.name;
                    document.getElementById('editDescription').value = category.description || '';
                    document.getElementById('editModal').classList.remove('hidden');
                } catch (error) {
                    console.error('Error loading category:', error);
                }
            }

            function closeEditModal() {
                document.getElementById('editModal').classList.add('hidden');
            }

            async function updateCategory(event) {
                event.preventDefault();
                const id = document.getElementById('editId').value;
                const name = document.getElementById('editName').value;
                const description = document.getElementById('editDescription').value;

                try {
                    await fetchAPI(`${API_BASE_URL}/categories/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            name,
                            description: description || null
                        })
                    });
                    showSuccess('Category updated successfully');
                    closeEditModal();
                    loadCategories();
                } catch (error) {
                    console.error('Error updating category:', error);
                }
            }

            async function deleteCategory() {
                const id = document.getElementById('editId').value;
                try {
                    await fetchAPI(`${API_BASE_URL}/categories/${id}`, {
                        method: 'DELETE'
                    });
                    showSuccess('Category deleted successfully');
                    closeEditModal();
                    loadCategories();
                } catch (error) {
                    console.error('Error deleting category:', error);
                }
            }

            // Load categories on page load
            document.addEventListener('DOMContentLoaded', loadCategories);
        </script>
    </body>
</html>
