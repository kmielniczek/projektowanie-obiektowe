<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Products</title>
        <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body class="bg-gray-100">
        <nav class="bg-white border-b border-gray-200 shadow">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16">
                    <div class="flex items-center">
                        <a href="index.html"
                            class="text-2xl font-bold text-blue-600 hover:text-blue-800 text-decoration-none">Products
                            Store</a>
                    </div>
                    <div class="flex items-center space-x-4">
                        <a href="index.html"
                            class="text-gray-700 hover:bg-gray-100 hover:text-blue-600 px-3 py-2 rounded-md font-medium">Home</a>
                        <a href="products.html"
                            class="text-gray-700 bg-blue-100 hover:bg-blue-200 px-3 py-2 rounded-md font-bold">Products</a>
                        <a href="categories.html"
                            class="text-gray-700 hover:bg-gray-100 hover:text-blue-600 px-3 py-2 rounded-md font-medium">Categories</a>
                        <a href="orders.html"
                            class="text-gray-700 hover:bg-gray-100 hover:text-blue-600 px-3 py-2 rounded-md font-medium">Orders</a>
                    </div>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto py-8 px-4 sm:px-6 lg:px-8">
            <!-- Alert Messages -->
            <div id="successAlert"
                class="hidden mb-4 p-4 bg-green-100 border border-green-400 text-green-700 rounded-lg"></div>
            <div id="errorAlert" class="hidden mb-4 p-4 bg-red-100 border border-red-400 text-red-700 rounded-lg"></div>

            <div class="bg-white rounded-lg shadow-lg">
                <!-- Header with Create Button -->
                <div class="border-b border-gray-200 px-6 py-4 flex justify-between items-center">
                    <h2 class="text-2xl font-bold text-gray-900">Products</h2>
                    <button onclick="showCreateForm()"
                        class="bg-green-600 hover:bg-green-700 text-white font-semibold py-2 px-4 rounded-lg">
                        + New Product
                    </button>
                </div>

                <!-- Create Form -->
                <div id="createForm" class="hidden border-b border-gray-200 p-6 bg-gray-50">
                    <h3 class="text-lg font-semibold text-gray-900 mb-4">Create New Product</h3>
                    <form onsubmit="createProduct(event)">
                        <div class="mb-4">
                            <label class="block text-gray-700 font-medium mb-2">Name *</label>
                            <input type="text" id="createName" required
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
                                placeholder="Product name">
                        </div>
                        <div class="mb-4">
                            <label class="block text-gray-700 font-medium mb-2">Price *</label>
                            <input type="number" id="createPrice" required step="0.01" min="0"
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
                                placeholder="0.00">
                        </div>
                        <div class="mb-4">
                            <label class="block text-gray-700 font-medium mb-2">Category</label>
                            <select id="createCategory"
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
                                <option value="">-- None --</option>
                            </select>
                        </div>
                        <div class="flex gap-2">
                            <button type="submit"
                                class="bg-green-600 hover:bg-green-700 text-white font-semibold py-2 px-4 rounded-lg">Create</button>
                            <button type="button" onclick="hideCreateForm()"
                                class="bg-gray-400 hover:bg-gray-500 text-white font-semibold py-2 px-4 rounded-lg">Cancel</button>
                        </div>
                    </form>
                </div>

                <!-- Products Table -->
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead class="bg-gray-100 border-b border-gray-200">
                            <tr>
                                <th class="px-6 py-3 text-left text-sm font-semibold text-gray-900">ID</th>
                                <th class="px-6 py-3 text-left text-sm font-semibold text-gray-900">Name</th>
                                <th class="px-6 py-3 text-left text-sm font-semibold text-gray-900">Price</th>
                                <th class="px-6 py-3 text-left text-sm font-semibold text-gray-900">Category</th>
                                <th class="px-6 py-3 text-left text-sm font-semibold text-gray-900">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="productsTable">
                            <tr class="border-b border-gray-200">
                                <td colspan="5" class="px-6 py-8 text-center text-gray-500">Loading products...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>

        <!-- View Modal -->
        <div id="viewModal" class="hidden fixed inset-0 z-50 overflow-y-auto">
            <div class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center block sm:p-0">
                <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" onclick="closeViewModal()">
                </div>
                <div
                    class="relative inline-block align-bottom bg-white rounded-lg text-left max-h-[calc(100vh-4rem)] overflow-y-auto shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full">
                    <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                        <h3 class="text-lg font-medium text-gray-900 mb-4">Product Details</h3>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-gray-700 font-medium mb-1">ID</label>
                                <p class="text-gray-900" id="viewId">-</p>
                            </div>
                            <div>
                                <label class="block text-gray-700 font-medium mb-1">Name</label>
                                <p class="text-gray-900" id="viewName">-</p>
                            </div>
                            <div>
                                <label class="block text-gray-700 font-medium mb-1">Price</label>
                                <p class="text-gray-900" id="viewPrice">-</p>
                            </div>
                            <div>
                                <label class="block text-gray-700 font-medium mb-1">Category</label>
                                <p class="text-gray-900" id="viewCategory">-</p>
                            </div>
                        </div>
                        <div class="flex gap-2 justify-end mt-6">
                            <button type="button" onclick="closeViewModal()"
                                class="bg-gray-400 hover:bg-gray-500 text-white font-semibold py-2 px-4 rounded-lg">Close</button>
                            <button type="button" onclick="switchToEditModal()"
                                class="bg-green-600 hover:bg-green-700 text-white font-semibold py-2 px-4 rounded-lg">Edit</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Edit Modal -->
        <div id="editModal" class="hidden fixed inset-0 z-50 overflow-y-auto">
            <div class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center block sm:p-0">
                <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" onclick="closeEditModal()">
                </div>
                <div
                    class="relative inline-block align-bottom bg-white rounded-lg text-left max-h-[calc(100vh-4rem)] overflow-y-auto shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full">
                    <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                        <h3 class="text-lg font-medium text-gray-900 mb-4">Edit Product</h3>
                        <form onsubmit="updateProduct(event)">
                            <input type="hidden" id="editId">
                            <div class="mb-4">
                                <label class="block text-gray-700 font-medium mb-2">Name *</label>
                                <input type="text" id="editName" required
                                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
                            </div>
                            <div class="mb-4">
                                <label class="block text-gray-700 font-medium mb-2">Price *</label>
                                <input type="number" id="editPrice" required step="0.01" min="0"
                                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
                            </div>
                            <div class="mb-4">
                                <label class="block text-gray-700 font-medium mb-2">Category</label>
                                <select id="editCategory"
                                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
                                    <option value="">-- None --</option>
                                </select>
                            </div>
                            <div class="flex gap-2 justify-end">
                                <button type="button" onclick="closeEditModal()"
                                    class="bg-gray-400 hover:bg-gray-500 text-white font-semibold py-2 px-4 rounded-lg">Cancel</button>
                                <button type="submit"
                                    class="bg-green-600 hover:bg-green-700 text-white font-semibold py-2 px-4 rounded-lg">Update</button>
                                <button type="button" onclick="deleteProduct()"
                                    class="bg-red-600 hover:bg-red-700 text-white font-semibold py-2 px-4 rounded-lg">Delete</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <script>
            const API_BASE_URL = '/api';
            async function fetchAPI(url, options = {}) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) {
                        const errorData = await response.json().catch(() => ({}));
                        throw new Error(errorData.error || `HTTP ${response.status}`);
                    }
                    return response.status === 204 ? null : await response.json();
                } catch (error) {
                    showError(error.message);
                    throw error;
                }
            }

            function showSuccess(message) {
                const alert = document.getElementById('successAlert');
                alert.textContent = message;
                alert.classList.remove('hidden');
                setTimeout(() => alert.classList.add('hidden'), 3000);
            }

            function showError(message) {
                const alert = document.getElementById('errorAlert');
                alert.textContent = message;
                alert.classList.remove('hidden');
                setTimeout(() => alert.classList.add('hidden'), 5000);
            }

            async function loadCategories() {
                try {
                    const categories = await fetchAPI(`${API_BASE_URL}/categories`);
                    const createSelect = document.getElementById('createCategory');
                    const editSelect = document.getElementById('editCategory');

                    const options = categories.map(cat => `<option value="${cat.id}">${cat.name}</option>`).join('');
                    createSelect.innerHTML = '<option value="">-- None --</option>' + options;
                    editSelect.innerHTML = '<option value="">-- None --</option>' + options;
                } catch (error) {
                    console.error('Error loading categories:', error);
                }
            }

            async function loadProducts() {
                try {
                    const products = await fetchAPI(`${API_BASE_URL}/products`);
                    const table = document.getElementById('productsTable');

                    if (!products || products.length === 0) {
                        table.innerHTML = '<tr class="border-b border-gray-200"><td colspan="5" class="px-6 py-8 text-center text-gray-500">No products found</td></tr>';
                        return;
                    }

                    table.innerHTML = products.map(prod => `
                    <tr class="border-b border-gray-200 hover:bg-gray-50 cursor-pointer" onclick="openViewModal(${prod.id})">
                        <td class="px-6 py-4 text-sm text-gray-900">${prod.id}</td>
                        <td class="px-6 py-4 text-sm text-gray-900"><span class="font-bold">${prod.name}</span></td>
                        <td class="px-6 py-4 text-sm text-gray-900">${parseFloat(prod.price).toFixed(2)}</td>
                        <td class="px-6 py-4 text-sm text-gray-600">${prod.category ? '<span class="font-bold">' + prod.category.name + '</span>' : '-'}</td>
                        <td class="px-6 py-4 text-sm" onclick="event.stopPropagation()">
                            <button onclick="openEditModal(${prod.id})" class="bg-green-600 hover:bg-green-700 text-white font-medium py-1 px-3 rounded-lg">Edit</button>
                        </td>
                    </tr>
                `).join('');
                } catch (error) {
                    console.error('Error loading products:', error);
                }
            }

            function showCreateForm() {
                document.getElementById('createForm').classList.remove('hidden');
            }

            function hideCreateForm() {
                document.getElementById('createForm').classList.add('hidden');
                document.getElementById('createName').value = '';
                document.getElementById('createPrice').value = '';
                document.getElementById('createCategory').value = '';
            }

            async function createProduct(event) {
                event.preventDefault();
                const name = document.getElementById('createName').value;
                const price = document.getElementById('createPrice').value;
                const categoryId = document.getElementById('createCategory').value;

                try {
                    await fetchAPI(`${API_BASE_URL}/products`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            name,
                            price,
                            categoryId: categoryId ? parseInt(categoryId) : null
                        })
                    });
                    showSuccess('Product created successfully');
                    hideCreateForm();
                    loadProducts();
                } catch (error) {
                    console.error('Error creating product:', error);
                }
            }

            async function openViewModal(id) {
                try {
                    const product = await fetchAPI(`${API_BASE_URL}/products/${id}`);
                    document.getElementById('viewId').textContent = product.id;
                    document.getElementById('viewName').textContent = product.name;
                    document.getElementById('viewPrice').textContent = parseFloat(product.price).toFixed(2);
                    document.getElementById('viewCategory').textContent = product.category ? product.category.name : '-';
                    document.getElementById('viewModal').classList.remove('hidden');
                    window.currentProductId = id;
                } catch (error) {
                    console.error('Error loading product:', error);
                }
            }

            function closeViewModal() {
                document.getElementById('viewModal').classList.add('hidden');
            }

            async function switchToEditModal() {
                closeViewModal();
                await openEditModal(window.currentProductId);
            }

            async function openEditModal(id) {
                try {
                    const product = await fetchAPI(`${API_BASE_URL}/products/${id}`);
                    document.getElementById('editId').value = product.id;
                    document.getElementById('editName').value = product.name;
                    document.getElementById('editPrice').value = product.price;
                    document.getElementById('editCategory').value = product.category ? product.category.id : '';
                    document.getElementById('editModal').classList.remove('hidden');
                } catch (error) {
                    console.error('Error loading product:', error);
                }
            }

            function closeEditModal() {
                document.getElementById('editModal').classList.add('hidden');
            }

            async function updateProduct(event) {
                event.preventDefault();
                const id = document.getElementById('editId').value;
                const name = document.getElementById('editName').value;
                const price = document.getElementById('editPrice').value;
                const categoryId = document.getElementById('editCategory').value;

                try {
                    await fetchAPI(`${API_BASE_URL}/products/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            name,
                            price,
                            categoryId: categoryId ? parseInt(categoryId) : null
                        })
                    });
                    showSuccess('Product updated successfully');
                    closeEditModal();
                    loadProducts();
                } catch (error) {
                    console.error('Error updating product:', error);
                }
            }

            async function deleteProduct() {
                const id = document.getElementById('editId').value;
                try {
                    await fetchAPI(`${API_BASE_URL}/products/${id}`, {
                        method: 'DELETE'
                    });
                    showSuccess('Product deleted successfully');
                    closeEditModal();
                    loadProducts();
                } catch (error) {
                    console.error('Error deleting product:', error);
                }
            }

            // Load data on page load
            document.addEventListener('DOMContentLoaded', () => {
                loadCategories();
                loadProducts();
            });
        </script>
    </body>
</html>
