<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Product Store</title>
        <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body class="bg-gray-100">
        <nav class="bg-white border-b border-gray-200 shadow">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16">
                    <div class="flex items-center">
                        <a href="index.html"
                            class="text-2xl font-bold text-blue-600 hover:text-blue-800 text-decoration-none">Products
                            Store</a>
                    </div>
                    <div class="flex items-center space-x-4">
                        <a href="index.html"
                            class="text-gray-700 bg-blue-100 hover:bg-blue-200 px-3 py-2 rounded-md font-bold">Home</a>
                        <a href="products.html"
                            class="text-gray-700 hover:bg-gray-100 hover:text-blue-600 px-3 py-2 rounded-md font-medium">Products</a>
                        <a href="categories.html"
                            class="text-gray-700 hover:bg-gray-100 hover:text-blue-600 px-3 py-2 rounded-md font-medium">Categories</a>
                        <a href="orders.html"
                            class="text-gray-700 hover:bg-gray-100 hover:text-blue-600 px-3 py-2 rounded-md font-medium">Orders</a>
                    </div>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto py-12 px-4 sm:px-6 lg:px-8">
            <div class="bg-white rounded-lg shadow-lg p-8">
                <h2 class="text-3xl font-bold text-gray-900 mb-6">Welcome to Product Store</h2>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div
                        class="bg-gradient-to-br from-green-50 to-green-100 rounded-lg px-6 py-4 border border-green-200">
                        <h3 class="text-xl font-bold text-green-900 mb-4">Products</h3>
                        <a href="products.html"
                            class="inline-block bg-green-600 hover:bg-green-700 text-white font-semibold py-2 px-4 rounded-lg">Go
                            to products</a>
                    </div>

                    <div class="bg-gradient-to-br from-blue-50 to-blue-100 rounded-lg px-6 py-4 border border-blue-200">
                        <h3 class="text-xl font-bold text-blue-900 mb-4">Categories</h3>
                        <a href="categories.html"
                            class="inline-block bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg">Go
                            to Categories</a>
                    </div>

                    <div
                        class="bg-gradient-to-br from-purple-50 to-purple-100 rounded-lg px-6 py-4 border border-purple-200">
                        <h3 class="text-xl font-bold text-purple-900 mb-4">Orders</h3>
                        <a href="orders.html"
                            class="inline-block bg-purple-600 hover:bg-purple-700 text-white font-semibold py-2 px-4 rounded-lg">Go
                            to Orders</a>
                    </div>
                </div>
            </div>
        </main>
    </body>
</html>
